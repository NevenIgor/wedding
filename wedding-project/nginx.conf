# 🔄 HTTP → HTTPS редирект
server {
    listen 80;
    server_name anton-and-nika-wedding.ru www.anton-and-nika-wedding.ru;

    # Для проверки домена при получении сертификата
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # Всё остальное → редирект на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# 🔒 HTTPS сервер
server {
    listen 443 ssl http2;
    server_name anton-and-nika-wedding.ru www.anton-and-nika-wedding.ru;

    # SSL сертификаты
    ssl_certificate /etc/letsencrypt/live/anton-and-nika-wedding.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/anton-and-nika-wedding.ru/privkey.pem;
    
    # Безопасность
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 🌐 Фронтенд (статика)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # ⚙️ API → бэкенд
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Таймауты для долгих запросов
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 📁 Статика (оптимизация)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 🚫 Блокировка чувствительных путей
    location ~ /\. {
        deny all;
    }
}