version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wedding-backend
    environment:
      - DB_PATH=/data/wedding.db
      - TG_BOT_TOKEN=${TG_BOT_TOKEN}
      - TG_USER_IDS=${TG_USER_IDS}
      - API_SECRET=${API_SECRET:-wedding_secret_2026}
    volumes:
      - backend_data:/data
    ports:
      - "5000:5000"
    networks:
      - wedding-network
    restart: unless-stopped

  # Telegram Bot
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: wedding-bot
    environment:
      - TG_BOT_TOKEN=${TG_BOT_TOKEN}
      - BACKEND_URL=http://backend:5000
      - API_SECRET=${API_SECRET:-wedding_secret_2026}
    depends_on:
      - backend
    networks:
      - wedding-network
    restart: unless-stopped

  # Frontend (Nginx)
  frontend:
    image: nginx:alpine
    container_name: wedding-frontend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    networks:
      - wedding-network
    restart: unless-stopped

networks:
  wedding-network:
    driver: bridge

volumes:
  backend_data:
